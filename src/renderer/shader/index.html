<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
  // Self-contained fullscreen fragment-shader wallpaper. The preset is chosen
  // via ?preset=NAME. Runs entirely locally — no network, no X-Frame issues.
  const params = new URLSearchParams(location.search);
  const preset = params.get('preset') || 'aurora';
  const speed = (parseFloat(params.get('speed')) || 100) / 100; // percent (100 = normal)

  const COMMON = `precision highp float;
  uniform vec2 u_res; uniform float u_time;
  #define PI 3.14159265359
  mat2 rot(float a){ float c=cos(a),s=sin(a); return mat2(c,-s,s,c); }
  float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
  float noise(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
    return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y); }
  float fbm(vec2 p){ float v=0.0,a=0.5; for(int i=0;i<6;i++){ v+=a*noise(p); p*=2.0; a*=0.5; } return v; }`;

  const PRESETS = {
    aurora: `${COMMON}
      void main(){
        vec2 uv = gl_FragCoord.xy/u_res.xy;
        vec2 p = (gl_FragCoord.xy*2.0-u_res.xy)/u_res.y;
        float t = u_time*0.15;
        float n = fbm(p*1.5 + vec2(t, t*0.6));
        float bands = fbm(vec2(p.x*2.0 + t, p.y*3.0 - n*2.0));
        vec3 c1 = vec3(0.05,0.35,0.45), c2 = vec3(0.45,0.15,0.65), c3 = vec3(0.1,0.7,0.55);
        vec3 col = mix(c1, c3, smoothstep(0.2,0.8,bands));
        col = mix(col, c2, smoothstep(0.3,0.9,n));
        float glow = pow(1.0-abs(p.y+0.2-bands*0.6), 3.0);
        col += glow*vec3(0.2,0.5,0.4);
        col *= 0.5 + 0.5*uv.y;
        col += hash(gl_FragCoord.xy+u_time)*0.02;
        gl_FragColor = vec4(col,1.0);
      }`,
    plasma: `${COMMON}
      void main(){
        vec2 p = (gl_FragCoord.xy*2.0-u_res.xy)/u_res.y;
        float t = u_time*0.4;
        float v = sin(p.x*3.0+t) + sin(p.y*3.0+t*1.3)
                + sin((p.x+p.y)*2.0+t*0.7) + sin(length(p)*4.0-t*1.1);
        v *= 0.25;
        vec3 col = 0.5 + 0.5*cos(vec3(0.0,2.0,4.0) + v*PI + t*0.2);
        gl_FragColor = vec4(col,1.0);
      }`,
    starfield: `${COMMON}
      void main(){
        vec2 uv = (gl_FragCoord.xy*2.0-u_res.xy)/u_res.y;
        float t = u_time*0.06;
        vec3 col = vec3(0.01,0.02,0.05);
        for(float i=0.0;i<4.0;i++){
          float d = fract(t + i*0.25);
          float s = mix(8.0, 0.2, d);
          vec2 g = uv*s + vec2(i*91.7, i*13.3);
          vec2 id = floor(g); vec2 f = fract(g)-0.5;
          float h = hash(id);
          float star = smoothstep(0.12,0.0,length(f)) * step(0.93, h);
          float fade = smoothstep(0.0,0.2,d)*smoothstep(1.0,0.7,d);
          col += star*fade*vec3(0.8,0.85,1.0);
        }
        col += pow(max(0.0,1.0-length(uv)*0.5),2.0)*vec3(0.05,0.07,0.12);
        gl_FragColor = vec4(col,1.0);
      }`,
    warp: `${COMMON}
      void main(){
        vec2 p = (gl_FragCoord.xy*2.0-u_res.xy)/u_res.y;
        float t = u_time*0.2;
        for(int i=1;i<5;i++){
          float fi = float(i);
          p += 0.35/fi * sin(p.yx*fi*1.5 + t*1.3 + fi) ;
          p *= rot(0.1*sin(t*0.3));
        }
        vec3 col = 0.5+0.5*cos(vec3(0.0,1.5,3.0)+length(p)*1.5 + t);
        col *= 0.7+0.3*sin(p.x*2.0+t);
        gl_FragColor = vec4(col*col,1.0);
      }`,
    nebula: `${COMMON}
      void main(){
        vec2 p = (gl_FragCoord.xy*2.0-u_res.xy)/u_res.y;
        float t = u_time*0.05;
        vec2 q = p*1.2;
        float f = fbm(q + vec2(t, -t));
        float f2 = fbm(q*2.0 + f*1.6 + vec2(-t, t));
        vec3 col = vec3(0.02,0.0,0.06);
        col += mix(vec3(0.55,0.1,0.65), vec3(0.1,0.35,0.85), f) * pow(f2,1.5)*1.5;
        col += vec3(0.95,0.45,0.35)*pow(fbm(q*1.5+10.0+f),3.0);
        col += step(0.992, hash(floor(gl_FragCoord.xy/2.0)))*vec3(1.0);
        gl_FragColor = vec4(col,1.0);
      }`,
    fire: `${COMMON}
      void main(){
        vec2 uv = gl_FragCoord.xy/u_res.xy;
        vec2 p = vec2(uv.x, 1.0-uv.y);
        float t = u_time*1.2;
        float n = fbm(vec2(p.x*4.0, p.y*5.0 - t*1.5));
        float flame = smoothstep(0.0, 1.2, (1.0-p.y)*1.6 + (n-0.5)*1.1 - 0.1);
        vec3 col = vec3(1.5,0.5,0.1)*flame;
        col += vec3(1.5,1.1,0.2)*pow(flame,3.0);
        col = mix(vec3(0.02,0.0,0.0), col, smoothstep(0.0,0.15,flame));
        gl_FragColor = vec4(col,1.0);
      }`,
    tunnel: `${COMMON}
      void main(){
        vec2 p = (gl_FragCoord.xy*2.0-u_res.xy)/u_res.y;
        float t = u_time;
        float a = atan(p.y,p.x);
        float r = length(p);
        float u = 0.35/r + t*0.6;
        float v = a/PI;
        float rings = 0.5+0.5*sin(u*12.0);
        float spokes = 0.5+0.5*sin(v*16.0 + sin(u*4.0));
        vec3 col = 0.5+0.5*cos(vec3(0.0,2.0,4.0) + u*2.0 + v*3.0);
        col *= mix(0.4,1.0,rings*spokes);
        col *= smoothstep(0.0,0.5,r);
        gl_FragColor = vec4(col*col,1.0);
      }`,
    caustics: `${COMMON}
      void main(){
        vec2 p = (gl_FragCoord.xy*2.0-u_res.xy)/u_res.y;
        float t = u_time*0.4;
        vec2 q = p*3.0;
        float c = 0.0;
        for(int i=0;i<4;i++){
          float fi=float(i);
          vec2 o = vec2(sin(t+fi)*1.3, cos(t*1.1+fi)*1.3);
          c += 0.25/length(sin(q + o + sin(q.yx*1.5 + t)));
        }
        c = pow(c*0.5, 1.6);
        vec3 col = mix(vec3(0.0,0.15,0.3), vec3(0.4,0.9,1.0), clamp(c,0.0,1.0));
        gl_FragColor = vec4(col,1.0);
      }`,
    synthwave: `${COMMON}
      void main(){
        vec2 uv = gl_FragCoord.xy/u_res.xy;
        vec2 p = (gl_FragCoord.xy*2.0-u_res.xy)/u_res.y;
        float t = u_time*0.5;
        vec3 col = mix(vec3(0.12,0.02,0.22), vec3(0.55,0.10,0.42), uv.y);
        vec2 sp = p - vec2(0.0,0.32);
        float sun = smoothstep(0.40,0.37,length(sp));
        sun *= step(0.0,sin(sp.y*46.0+2.0)) + smoothstep(0.0,-0.3,sp.y);
        col = mix(col, mix(vec3(1.0,0.9,0.35),vec3(1.0,0.28,0.55),uv.y), clamp(sun,0.0,1.0));
        if(p.y < -0.04){
          vec2 fp = p; fp.y = 0.25/(-fp.y - 0.04); fp.x *= fp.y; fp.y -= t;
          vec2 g = abs(fract(fp*3.0)-0.5);
          float line = smoothstep(0.07,0.0,min(g.x,g.y));
          col += vec3(0.15,0.95,0.95)*line*smoothstep(-0.04,-0.7,p.y);
        }
        gl_FragColor = vec4(col,1.0);
      }`,
    vortex: `${COMMON}
      void main(){
        vec2 p = (gl_FragCoord.xy*2.0-u_res.xy)/u_res.y;
        float t = u_time*0.3;
        float r = length(p);
        float a = atan(p.y,p.x) + r*3.0 - t*2.0;
        float swirl = fbm(vec2(a, r*2.0 - t));
        vec3 col = 0.5+0.5*cos(vec3(0.0,2.1,4.2) + swirl*4.0 + r*2.0);
        col *= smoothstep(1.4,0.1,r);
        gl_FragColor = vec4(col*col,1.0);
      }`,
    sunset: `${COMMON}
      void main(){
        vec2 uv = gl_FragCoord.xy/u_res.xy;
        float t = u_time*0.05;
        float horizon = 0.42;
        vec3 sky = mix(vec3(0.95,0.5,0.25), vec3(0.25,0.1,0.45), smoothstep(horizon,1.0,uv.y));
        sky = mix(vec3(1.0,0.8,0.4), sky, smoothstep(horizon,horizon+0.25,uv.y));
        float sy = 0.30 + 0.02*sin(t);
        float sun = smoothstep(0.16,0.14,length((uv-vec2(0.5,sy))*vec2(u_res.x/u_res.y,1.0)));
        vec3 col = mix(sky, vec3(1.0,0.85,0.5), sun);
        if(uv.y < horizon){
          vec3 water = mix(vec3(0.6,0.3,0.25), vec3(0.1,0.05,0.2), (horizon-uv.y)/horizon);
          float shimmer = 0.5+0.5*sin(uv.y*120.0 + sin(uv.x*8.0+t*4.0)*2.0);
          water += vec3(0.5,0.3,0.15)*shimmer*smoothstep(0.0,0.16,abs(uv.x-0.5))*0.0;
          water += vec3(0.6,0.35,0.2)*pow(shimmer,3.0)*smoothstep(horizon,0.0,uv.y);
          col = water;
        }
        gl_FragColor = vec4(col,1.0);
      }`,
    clouds: `${COMMON}
      void main(){
        vec2 uv = gl_FragCoord.xy/u_res.xy;
        vec2 p = gl_FragCoord.xy/u_res.y;
        float t = u_time*0.03;
        vec3 sky = mix(vec3(0.25,0.5,0.85), vec3(0.55,0.75,0.95), uv.y);
        float c = fbm(p*2.0 + vec2(t*3.0, 0.0));
        c = smoothstep(0.4, 0.9, c);
        vec3 col = mix(sky, vec3(1.0), c*0.9);
        col += fbm(p*5.0 + t*5.0)*0.04;
        gl_FragColor = vec4(col,1.0);
      }`,
    mesh: `${COMMON}
      void main(){
        vec2 uv = gl_FragCoord.xy/u_res.xy;
        float t = u_time*0.3;
        vec3 a = 0.5+0.5*cos(vec3(0.0,2.0,4.0)+t);
        vec3 b = 0.5+0.5*cos(vec3(1.0,3.0,5.0)+t*1.2);
        vec3 c = 0.5+0.5*cos(vec3(4.0,1.0,2.0)+t*0.8);
        vec3 d = 0.5+0.5*cos(vec3(2.0,5.0,3.0)+t*1.4);
        float fx = 0.5+0.5*sin(uv.x*3.0+t);
        float fy = 0.5+0.5*sin(uv.y*3.0+t*1.1);
        vec3 col = mix(mix(a,b,fx), mix(c,d,fx), fy);
        gl_FragColor = vec4(col,1.0);
      }`,
  };

  // Header shared with custom shaders so they get the same uniforms + helpers.
  window.LUMINA_SHADER_HEADER = COMMON;

  const canvas = document.getElementById('c');
  const gl = canvas.getContext('webgl');
  const VERT = 'attribute vec2 a; void main(){ gl_Position = vec4(a,0.0,1.0); }';

  let prog = null, uRes = null, uTime = null, buf = null;

  function compile(type, src){
    const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
    if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
      const log = gl.getShaderInfoLog(s); gl.deleteShader(s); return { error: log };
    }
    return { shader: s };
  }

  // Report compile/link status to the editor (parent window), so it can show
  // GLSL errors inline. Empty log = success.
  function notifyStatus(log){ try { parent.postMessage({ type: 'lumina:shaderStatus', log: log || '' }, '*'); } catch {} }

  // (Re)build the program from a full fragment source. Returns true on success;
  // on failure the previous program keeps running so the preview never goes black.
  function build(fragSrc){
    const vs = compile(gl.VERTEX_SHADER, VERT);
    if (vs.error){ notifyStatus(vs.error); return false; }
    const fs = compile(gl.FRAGMENT_SHADER, fragSrc);
    if (fs.error){ notifyStatus(fs.error); return false; }
    const p = gl.createProgram();
    gl.attachShader(p, vs.shader); gl.attachShader(p, fs.shader); gl.linkProgram(p);
    if(!gl.getProgramParameter(p, gl.LINK_STATUS)){ notifyStatus(gl.getProgramInfoLog(p)); gl.deleteProgram(p); return false; }
    if (prog) gl.deleteProgram(prog);
    prog = p; gl.useProgram(prog);
    if (!buf){
      buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
    } else gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    const loc = gl.getAttribLocation(prog, 'a'); gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    uRes = gl.getUniformLocation(prog, 'u_res');
    uTime = gl.getUniformLocation(prog, 'u_time');
    notifyStatus('');
    return true;
  }

  // Custom shaders supply only the body (after the shared header); presets are
  // already full sources. Both go through build().
  const buildCustom = (body) => build(`${COMMON}\n${body || 'void main(){ gl_FragColor = vec4(0.0,0.0,0.0,1.0); }'}`);

  let powerScale = 1;
  function resize(){
    const dpr = Math.min(window.devicePixelRatio || 1, 1.5) * powerScale;
    canvas.width = Math.floor(innerWidth*dpr);
    canvas.height = Math.floor(innerHeight*dpr);
    gl.viewport(0,0,canvas.width,canvas.height);
  }
  window.addEventListener('resize', resize); resize();

  let start = performance.now();
  let paused = false;
  let frameMinMs = 0, lastFrame = 0;

  if (preset === 'custom'){
    // Pull the GLSL from whoever embedded us (editor preview or wallpaper host).
    try { parent.postMessage({ type: 'lumina:shaderRequest' }, '*'); } catch {}
  } else {
    build(PRESETS[preset] || PRESETS.aurora);
  }

  // host → player: pause/resume to save GPU; live shader source for custom mode.
  window.addEventListener('message', (e) => {
    const d = e.data;
    if (d === 'pause'){ paused = true; return; }
    if (d === 'resume'){ paused = false; return; }
    if (d && d.type === 'lumina:shaderSource'){ start = performance.now(); buildCustom(d.code); }
    if (d && d.type === 'lumina:power'){
      frameMinMs = d.fps > 0 ? 1000 / d.fps : 0;
      const sc = d.scale || 1;
      if (sc !== powerScale){ powerScale = sc; resize(); }
    }
  });

  function frame(now){
    requestAnimationFrame(frame);
    if (paused || !prog) return;
    if (frameMinMs && now - lastFrame < frameMinMs - 1) return;
    lastFrame = now;
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, (now-start)/1000*speed);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
  }
  requestAnimationFrame(frame);
  </script>
</body>
</html>
