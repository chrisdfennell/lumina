name: Build & Release

# Push a tag like `v0.1.0` to build the Windows installer and publish a release.
# `workflow_dispatch` lets you run a build manually (artifact only, no release).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer (electron-builder → NSIS)
        # Build only — the release is published by the step below (softprops),
        # so tell electron-builder not to publish (avoids needing GH_TOKEN here).
        run: npm run dist -- --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumina-windows-installer
          path: |
            dist/*.exe
            dist/latest.yml
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # Attach the installer + auto-update metadata to the release.
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          generate_release_notes: true
